<!DOCTYPE html>
<html>
<head>
  <title>Token Clubhouse 4.5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; }
    
    #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #9c27b0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
    #loginScreen input { margin: 10px; padding: 12px; border-radius: 10px; border: none; font-size: 16px; width: 200px; text-align: center; }
    #loginScreen button { background: #4CAF50; color: white; padding: 12px 30px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; }

    .box { background: white; padding: 10px; width: 100%; max-width: 440px; border-radius: 0 0 20px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; height: 55vh; display: flex; flex-direction: column; margin: 0 auto; box-sizing: border-box; }
    
    .top-stats { display: flex; justify-content: space-around; margin-bottom: 5px; }
    .stat-pill { background: #ede7f6; color: #512da8; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
    
    #modeBtn { background: #9c27b0; font-size: 10px; padding: 4px 10px; border-radius: 10px; color: white; border: none; margin-bottom: 5px; align-self: center; cursor: pointer; }
    .question { font-size: 32px; font-weight: bold; margin: 5px 0; color: #333; height: 40px; }
    
    /* Input Display Area */
    #displayArea { font-size: 24px; font-weight: bold; color: #4CAF50; margin: 5px 0; min-height: 30px; letter-spacing: 2px; }
    .letter-grid { display: flex; justify-content: center; gap: 4px; margin: 5px 0; flex-wrap: wrap; }
    .letter-box { width: 30px; height: 38px; font-size: 18px; text-align: center; border: 2px solid #ddd; border-radius: 5px; text-transform: lowercase; font-weight: bold; display: flex; align-items: center; justify-content: center; background: #fff; }
    .letter-box.active { border-color: #9c27b0; background: #f3e5f5; }

    #helpArea { margin: 5px 0; padding: 8px; background: #fffde7; border-radius: 10px; border: 1px dashed #fbc02d; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    /* Keyboard Section */
    #keyboardArea { height: 35vh; background: #d2d6de; padding: 5px; display: flex; flex-direction: column; justify-content: center; border-top: 2px solid #abb1ba; }
    .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 5px; }
    .key { background: #fff; border-radius: 5px; padding: 12px 0; font-size: 18px; font-weight: bold; width: 35px; cursor: pointer; border: none; box-shadow: 0 2px 0 #abb1ba; -webkit-tap-highlight-color: transparent; }
    .key:active { background: #e0e0e0; transform: translateY(1px); box-shadow: none; }
    .key.wide { width: 60px; background: #4CAF50; color: white; }
    .key.back { width: 60px; background: #ff5252; color: white; }

    .bottom-tokens { background: white; padding: 5px 10px; width: 100%; max-width: 440px; margin: 0 auto; box-sizing: border-box; }
    .progress-container { width: 100%; height: 12px; background: #e0e0e0; border-radius: 6px; margin: 3px 0; overflow: hidden; }
    #progressBar { height: 100%; width: 0%; background: #4CAF50; transition: width 0.5s; }
    .token-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; }

    #message { font-weight: bold; font-size: 16px; margin: 2px 0; min-height: 20px; }
    #resetBtn { position: absolute; top: 5px; left: 5px; font-size: 9px; opacity: 0.2; background: none; border: none; }
    .confetti { position: fixed; width: 8px; height: 8px; z-index: 999; pointer-events: none; }
    @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>

<div id="loginScreen">
  <h1>Clubhouse Login 🪙</h1>
  <input type="text" id="loginName" placeholder="Name">
  <input type="password" id="loginPin" placeholder="PIN" maxlength="4">
  <button onclick="attemptLogin()">Enter</button>
  <p id="loginError" style="color: #ffcdd2; margin-top: 10px;"></p>
</div>

<div class="box" id="appContent" style="display:none;">
  <button id="resetBtn" onclick="resetPrompt()">Admin</button>
  <div class="top-stats">
    <div class="stat-pill">Math: <span id="mathCount">0</span>/10</div>
    <div class="stat-pill">Spell: <span id="spellCount">0</span>/20</div>
  </div>
  <button id="modeBtn" onclick="toggleMode()">Switch Mode</button>
  
  <div id="mathArea">
    <div class="question" id="mathQuestion"></div>
    <div id="displayArea">?</div>
  </div>
  
  <div id="spellingArea" style="display:none;">
    <button id="speakBtn" onclick="sayWord()">🔊</button>
    <div class="letter-grid" id="letterGrid"></div>
  </div>

  <p id="message"></p>

  <div id="helpArea">
    <div class="help-title" id="helpTitle">Helper</div>
    <div id="visualAid"></div>
  </div>
</div>

<div id="keyboardArea" style="display:none;">
  <div id="numpad" style="display:none;">
    <div class="kb-row">
      <button class="key" onclick="keyPress('1')">1</button><button class="key" onclick="keyPress('2')">2</button><button class="key" onclick="keyPress('3')">3</button>
    </div>
    <div class="kb-row">
      <button class="key" onclick="keyPress('4')">4</button><button class="key" onclick="keyPress('5')">5</button><button class="key" onclick="keyPress('6')">6</button>
    </div>
    <div class="kb-row">
      <button class="key" onclick="keyPress('7')">7</button><button class="key" onclick="keyPress('8')">8</button><button class="key" onclick="keyPress('9')">9</button>
    </div>
    <div class="kb-row">
      <button class="key back" onclick="keyPress('DEL')">⌫</button><button class="key" onclick="keyPress('0')">0</button><button class="key wide" onclick="checkAnswer()">OK</button>
    </div>
  </div>

  <div id="spellpad" style="display:none;">
    <div class="kb-row">
      <button class="key" onclick="keyPress('q')">q</button><button class="key" onclick="keyPress('w')">w</button><button class="key" onclick="keyPress('e')">e</button><button class="key" onclick="keyPress('r')">r</button><button class="key" onclick="keyPress('t')">t</button><button class="key" onclick="keyPress('y')">y</button><button class="key" onclick="keyPress('u')">u</button><button class="key" onclick="keyPress('i')">i</button><button class="key" onclick="keyPress('o')">o</button><button class="key" onclick="keyPress('p')">p</button>
    </div>
    <div class="kb-row">
      <button class="key" onclick="keyPress('a')">a</button><button class="key" onclick="keyPress('s')">s</button><button class="key" onclick="keyPress('d')">d</button><button class="key" onclick="keyPress('f')">f</button><button class="key" onclick="keyPress('g')">g</button><button class="key" onclick="keyPress('h')">h</button><button class="key" onclick="keyPress('j')">j</button><button class="key" onclick="keyPress('k')">k</button><button class="key" onclick="keyPress('l')">l</button>
    </div>
    <div class="kb-row">
      <button class="key back" onclick="keyPress('DEL')">⌫</button><button class="key" onclick="keyPress('z')">z</button><button class="key" onclick="keyPress('x')">x</button><button class="key" onclick="keyPress('c')">c</button><button class="key" onclick="keyPress('v')">v</button><button class="key" onclick="keyPress('b')">b</button><button class="key" onclick="keyPress('n')">n</button><button class="key" onclick="keyPress('m')">m</button><button class="key wide" onclick="checkAnswer()">OK</button>
    </div>
  </div>
</div>

<div class="bottom-tokens" id="tokenFooter" style="display:none;">
    <div class="token-labels">
      <span>Today: <span id="todayTokens">0</span>/300</span>
      <span>Total: <span id="totalTokens">0</span> 🪙</span>
    </div>
    <div class="progress-container"><div id="progressBar"></div></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6EpHAvwQrMluOEH1WbGmlRDgD515lnEsQZi2ChFhVyt_969Z_jsNRi6-kHW9wYryVTQ/exec';

let user = { name: "", total: 0, math: 0, spell: 0, today: 0, logs: "", history: 0 };
let mode = "math", spellingWords = [], currentWord = "", spellQueue = [], mistakeBuffer = [];
let num1, num2, operator, correctAnswer, attempts = 0, penaltyApplied = false;
let currentRevealedIndices = [], questionsSinceMistake = 0;
let currentInput = "", activeBoxIndex = 1;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playCheer() { const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.connect(g); g.connect(audioCtx.destination); osc.frequency.setValueAtTime(500, 0); osc.frequency.exponentialRampToValueAtTime(1200, 0.1); g.gain.setValueAtTime(0.1, 0); osc.start(); osc.stop(0.2); }
function playFart() { const osc = audioCtx.createOscillator(); const g = audioCtx.createGain(); osc.connect(g); g.connect(audioCtx.destination); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, 0); osc.frequency.linearRampToValueAtTime(40, 0.4); g.gain.setValueAtTime(0.1, 0); osc.start(); osc.stop(0.4); }

async function attemptLogin() {
    const name = document.getElementById("loginName").value.trim();
    const pin = document.getElementById("loginPin").value.trim();
    const err = document.getElementById("loginError");
    if(!name || !pin) return;
    err.innerText = "Connecting...";
    try {
        const res = await fetch(`${SCRIPT_URL}?action=login&name=${name}&pin=${pin}`);
        const data = await res.json();
        if(data === "error") { err.innerText = "Wrong name or PIN!"; }
        else {
            user = { name, ...data, history: parseInt(data.history) || 0 };
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("appContent").style.display = "flex";
            document.getElementById("keyboardArea").style.display = "flex";
            document.getElementById("tokenFooter").style.display = "block";
            await loadWords();
            updateScore();
            nextTask();
        }
    } catch(e) { err.innerText = "Server Error."; }
}

async function loadWords() {
    const res = await fetch(`${SCRIPT_URL}?action=getWords`);
    spellingWords = await res.json();
    spellQueue = [...spellingWords].sort(() => Math.random() - 0.5);
}

async function sync() { fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(user) }); }

function createConfetti() {
    for (let i = 0; i < 30; i++) {
        const c = document.createElement('div'); c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        c.style.animation = `fall ${Math.random() * 1.5 + 1}s linear forwards`;
        document.body.appendChild(c); setTimeout(() => c.remove(), 2000);
    }
}

function toggleMode() {
    mode = (mode === "math") ? "spelling" : "math";
    document.getElementById("mathArea").style.display = (mode === "math") ? "block" : "none";
    document.getElementById("spellingArea").style.display = (mode === "spelling") ? "block" : "none";
    nextTask();
}

function nextTask() {
    attempts = 0; penaltyApplied = false; currentRevealedIndices = []; currentInput = "";
    document.getElementById("message").innerText = "";
    document.getElementById("visualAid").innerHTML = "";
    document.getElementById("numpad").style.display = (mode === "math") ? "block" : "none";
    document.getElementById("spellpad").style.display = (mode === "spelling") ? "block" : "none";
    if (mode === "math") generateMath(); else generateSpelling();
}

function keyPress(val) {
    if (mode === "math") {
        if (val === "DEL") currentInput = currentInput.slice(0, -1);
        else if (currentInput.length < 5) currentInput += val;
        document.getElementById("displayArea").innerText = currentInput || "?";
    } else {
        const grid = document.getElementById("letterGrid");
        if (val === "DEL") {
            if (activeBoxIndex > 1) {
                activeBoxIndex--;
                grid.children[activeBoxIndex].innerText = "";
                updateActiveBox();
            }
        } else {
            if (activeBoxIndex < currentWord.length - 1) {
                grid.children[activeBoxIndex].innerText = val;
                activeBoxIndex++;
                updateActiveBox();
            }
        }
    }
}

function updateActiveBox() {
    const grid = document.getElementById("letterGrid");
    Array.from(grid.children).forEach((box, i) => {
        box.classList.toggle("active", i === activeBoxIndex && i < currentWord.length - 1);
    });
}

function generateMath() {
    const qCount = user.math + 1;
    if (qCount <= 3) { operator = Math.random() > 0.5 ? "+" : "-"; num1 = Math.floor(Math.random() * 10) + 10; num2 = Math.floor(Math.random() * 5) + 1; }
    else if (qCount <= 7) { 
        const ops = ["+", "-", "*"]; operator = ops[Math.floor(Math.random() * 3)];
        if (operator === "*") { num1 = Math.floor(Math.random() * 4) + 2; num2 = Math.floor(Math.random() * 4) + 2; }
        else { num1 = Math.floor(Math.random() * 15) + 15; num2 = Math.floor(Math.random() * 10) + 5; }
    } else { 
        operator = Math.random() > 0.5 ? "*" : "/"; num2 = Math.floor(Math.random() * 4) + 6; let ans = Math.floor(Math.random() * 4) + 6;
        if (operator === "*") num1 = ans; else num1 = num2 * ans;
    }
    if (operator === "-" && num2 > num1) [num1, num2] = [num2, num1];
    correctAnswer = (operator === "+") ? num1 + num2 : (operator === "-") ? num1 - num2 : (operator === "*") ? num1 * num2 : num1 / num2;
    document.getElementById("mathQuestion").innerText = `${num1} ${operator === '*' ? '×' : (operator === '/' ? '÷' : operator)} ${num2}`;
    document.getElementById("displayArea").innerText = "?";
}

function generateSpelling() {
    if (mistakeBuffer.length > 0 && questionsSinceMistake >= 4) { currentWord = mistakeBuffer.shift(); questionsSinceMistake = 0; }
    else { if (spellQueue.length === 0) spellQueue = [...spellingWords].sort(() => Math.random() - 0.5); currentWord = spellQueue.pop().toLowerCase(); questionsSinceMistake++; }
    const grid = document.getElementById("letterGrid"); grid.innerHTML = ""; activeBoxIndex = 1;
    for (let i = 0; i < currentWord.length; i++) {
        const b = document.createElement("div"); b.className = "letter-box";
        if (i === 0 || i === currentWord.length - 1) { b.innerText = currentWord[i]; b.style.background = "#f4f4f4"; }
        grid.appendChild(b);
    }
    updateActiveBox(); setTimeout(sayWord, 400);
}

function sayWord() { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(currentWord); m.rate = 0.7; window.speechSynthesis.speak(m); }

function checkAnswer() {
    let val = "";
    if (mode === "math") val = currentInput;
    else {
        const grid = document.getElementById("letterGrid");
        Array.from(grid.children).forEach(b => val += b.innerText);
    }
    if (!val) return;
    
    const isCorrect = (mode === "math") ? (parseInt(val) === correctAnswer) : (val.toLowerCase() === currentWord);
    const limitReached = (mode === "math" ? user.math >= 10 : user.spell >= 20);

    user.history++; // Cumulative counter

    if (isCorrect) {
        playCheer(); createConfetti();
        let r = 0; if (!limitReached && user.today < 300) { r = 10; if (mode === "math") user.math++; else user.spell++; }
        user.total += r; user.today += r;
        document.getElementById("message").style.color = "green"; document.getElementById("message").innerText = `Bravo ${user.name}! 🌟`;
        sync(); updateScore(); setTimeout(nextTask, 1500);
    } else {
        attempts++; playFart(); if (mode === "spelling") { setTimeout(sayWord, 600); if (!mistakeBuffer.includes(currentWord)) mistakeBuffer.push(currentWord); }
        if (!penaltyApplied && !limitReached) { user.total = Math.max(0, user.total - 3); user.today = Math.max(0, user.today - 3); penaltyApplied = true; user.logs += `[${new Date().toLocaleTimeString()}] ${mode}: ${val} wrong.\n`; sync(); updateScore(); }
        document.getElementById("message").style.color = "red"; document.getElementById("message").innerText = "-3 Tokens Penalty 💨";
        showHelp();
        if (attempts >= 6) { document.getElementById("message").innerText = `Ans: ${mode === "math" ? correctAnswer : currentWord}`; setTimeout(nextTask, 2500); }
    }
}

function showHelp() {
    const aid = document.getElementById("visualAid"); aid.innerHTML = "";
    if (mode === "math") {
        if (operator === "+") {
            const g1 = document.createElement("div"); g1.className = "ten-frame-grid";
            for(let i=0;i<num1;i++){const d=document.createElement("div");d.className="dot";g1.appendChild(d);}
            aid.appendChild(g1); aid.innerHTML += "+";
            const g2 = document.createElement("div"); g2.className = "ten-frame-grid";
            for(let i=0;i<num2;i++){const d=document.createElement("div");d.className="dot secondary";g2.appendChild(d);}
            aid.appendChild(g2);
        } else if (operator === "-") {
            const g1 = document.createElement("div"); g1.className = "ten-frame-grid";
            for(let i=0;i<num1;i++){const d=document.createElement("div");d.className=(i<num2)?"dot dim":"dot";g1.appendChild(d);}
            aid.appendChild(g1);
        } else if (operator === "*") {
            for(let r=0; r<num1; r++) {
                const row = document.createElement("div"); row.style.display="flex"; row.style.justifyContent="center";
                for(let c=0; c<num2; c++) { const d=document.createElement("div"); d.className="dot"; d.style.margin="1px"; row.appendChild(d); }
                aid.appendChild(row);
            }
        } else if (operator === "/") {
            for(let g=0; g<num2; g++) {
                const grp = document.createElement("div"); grp.className = "division-group";
                for(let i=0; i<correctAnswer; i++) { const d = document.createElement("div"); d.className = "dot"; d.style.margin="1px"; grp.appendChild(d); }
                aid.appendChild(grp);
            }
        }
    } else {
        let availableIndices = []; for(let i=1; i<currentWord.length-1; i++) { if(!currentRevealedIndices.includes(i)) availableIndices.push(i); }
        if(availableIndices.length > 0) { let randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)]; currentRevealedIndices.push(randomIndex); }
        let hint = ""; for(let i=0; i<currentWord.length; i++) { if (i === 0 || i === currentWord.length - 1 || currentRevealedIndices.includes(i)) { hint += currentWord[i] + " "; } else { hint += "_ "; } }
        aid.innerHTML = `<p style='font-size:32px; color:#2196F3; letter-spacing:4px; font-weight:bold; margin:0;'>${hint.toLowerCase()}</p>`;
    }
}

function updateScore() {
    document.getElementById("mathCount").innerText = user.math;
    document.getElementById("spellCount").innerText = user.spell;
    document.getElementById("todayTokens").innerText = user.today;
    document.getElementById("totalTokens").innerText = user.total;
    document.getElementById("progressBar").style.width = Math.min((user.today/300)*100, 100) + "%";
}

function resetPrompt() {
    let b = Math.floor(Math.random()*4)+11;
    if (prompt(`Admin: ${b}x${b}?`) == b*b) {
        let c = prompt("1: Reset Today\n2: Reset Total\n3: Errors\n4: Total Questions Count");
        if(c=="1") { user.math=0; user.spell=0; user.today=0; }
        else if(c=="2") { user.total=0; user.math=0; user.spell=0; user.today=0; }
        else if(c=="3") { alert(user.logs || "No errors."); user.logs = ""; }
        else if(c=="4") { alert(`Total Questions Answered: ${user.history}`); }
        sync(); updateScore();
    }
}
</script>
</body>
</html>
