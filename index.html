<!DOCTYPE html>
<html>
<head>
  <title>Token Clubhouse 4.3.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    #loginScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #9c27b0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: white; }
    #loginScreen input { margin: 10px; padding: 12px; border-radius: 10px; border: none; font-size: 16px; width: 200px; text-align: center; }
    #loginScreen button { background: #4CAF50; color: white; padding: 12px 30px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; }

    .box { background: white; padding: 10px; width: 100%; max-width: 440px; border-radius: 0 0 20px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; height: 62vh; display: flex; flex-direction: column; margin: 0 auto; box-sizing: border-box; }
    .top-stats { display: flex; justify-content: space-around; margin-bottom: 5px; }
    .stat-pill { background: #ede7f6; color: #512da8; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
    
    #modeBtn { background: #9c27b0; font-size: 10px; padding: 4px 10px; border-radius: 10px; color: white; border: none; margin-bottom: 5px; align-self: center; }
    .question { font-size: 32px; font-weight: bold; margin: 5px 0; color: #333; }
    #mathInput { font-size: 24px; padding: 5px; width: 90px; border: 2px solid #ddd; border-radius: 8px; text-align: center; }
    
    .letter-grid { display: flex; justify-content: center; gap: 3px; margin: 5px 0; flex-wrap: wrap; }
    .letter-box { width: 30px; height: 38px; font-size: 18px; text-align: center; border: 2px solid #ddd; border-radius: 5px; text-transform: lowercase; font-weight: bold; }

    #helpArea { margin: 5px 0; padding: 8px; background: #fffde7; border-radius: 10px; border: 1px dashed #fbc02d; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ten-frame-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; margin: 0 auto; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #2196F3; }
    .dot.secondary { background: #f44336; }
    .dot.dim { background: #e0e0e0; border: 1px solid #ccc; }
    .division-group { border: 2px solid #4CAF50; padding: 5px; border-radius: 8px; display: inline-block; margin: 4px; background: white; min-width: 30px; }

    button#submitBtn { font-size: 18px; padding: 12px 35px; background: #4CAF50; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #388E3C; margin-top: 5px; }
    #speakBtn { background: #2196F3; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; color: white; border: none; }

    .bottom-tokens { background: white; padding: 10px; width: 100%; max-width: 440px; margin: 0 auto; box-sizing: border-box; }
    .progress-container { width: 100%; height: 16px; background: #e0e0e0; border-radius: 8px; margin: 5px 0; overflow: hidden; border: 1px solid #ccc; }
    #progressBar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff5252, #ff1744); transition: width 0.5s; }
    .token-labels { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; }

    #message { font-weight: bold; font-size: 18px; margin: 5px 0; min-height: 25px; }
    #resetBtn { position: absolute; top: 5px; left: 5px; font-size: 9px; opacity: 0.2; background: none; border: none; }
    .confetti { position: fixed; width: 8px; height: 8px; z-index: 999; pointer-events: none; }
    @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>

<div id="loginScreen">
  <h1>Clubhouse Login 🪙</h1>
  <input type="text" id="loginName" placeholder="Name">
  <input type="password" id="loginPin" placeholder="PIN" maxlength="4">
  <button onclick="attemptLogin()">Enter</button>
  <p id="loginError" style="color: #ffcdd2; margin-top: 10px;"></p>
</div>

<div class="box" id="appContent" style="display:none;">
  <button id="resetBtn" onclick="resetPrompt()">Admin</button>
  <div class="top-stats">
    <div class="stat-pill">Math: <span id="mathCount">0</span>/10</div>
    <div class="stat-pill">Spell: <span id="spellCount">0</span>/20</div>
  </div>
  <button id="modeBtn" onclick="toggleMode()">Switch Mode</button>
  
  <div id="mathArea">
    <div class="question" id="mathQuestion"></div>
    <input type="number" id="mathInput" placeholder="?">
  </div>
  
  <div id="spellingArea" style="display:none;">
    <button id="speakBtn" onclick="sayWord()">🔊</button>
    <div class="letter-grid" id="letterGrid"></div>
  </div>

  <p id="message"></p>
  <button id="submitBtn" onclick="checkAnswer()">Submit</button>

  <div id="helpArea">
    <div class="help-title" id="helpTitle">Helper</div>
    <div id="visualAid"></div>
  </div>
</div>

<div class="bottom-tokens" id="tokenFooter" style="display:none;">
    <div class="token-labels">
      <span>Today: <span id="todayTokens">0</span>/300</span>
      <span>Total: <span id="totalTokens">0</span> 🪙</span>
    </div>
    <div class="progress-container"><div id="progressBar"></div></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw4WeR4pIbtdlmHaD3tRgDtJa1ILasfn2M3pcgJ89Z0JPXpZCrMj7OD331k26pRj8-Eag/exec';

let user = { name: "", total: 0, math: 0, spell: 0, today: 0, logs: "", history: "" };
let mode = "math", spellingWords = [], currentWord = "", spellQueue = [], mistakeBuffer = [];
let num1, num2, operator, correctAnswer, attempts = 0, penaltyApplied = false;
let currentRevealedIndices = [];
let questionsSinceMistake = 0;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCheer() {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(500, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
}

function playFart() {
    const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
}

async function attemptLogin() {
    const name = document.getElementById("loginName").value.trim();
    const pin = document.getElementById("loginPin").value.trim();
    const err = document.getElementById("loginError");
    if(!name || !pin) return;
    err.innerText = "Connecting...";
    try {
        const res = await fetch(`${SCRIPT_URL}?action=login&name=${name}&pin=${pin}`);
        const data = await res.json();
        if(data === "error") { err.innerText = "Wrong name or PIN!"; }
        else {
            user = { name, ...data };
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("appContent").style.display = "flex";
            document.getElementById("tokenFooter").style.display = "block";
            await loadWords();
            updateScore();
            nextTask();
        }
    } catch(e) { err.innerText = "Server Error."; }
}

async function loadWords() {
    const res = await fetch(`${SCRIPT_URL}?action=getWords`);
    spellingWords = await res.json();
    spellQueue = [...spellingWords].sort(() => Math.random() - 0.5);
}

async function sync() {
    fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(user) });
}

function createConfetti() {
    for (let i = 0; i < 35; i++) {
        const c = document.createElement('div'); c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        c.style.animation = `fall ${Math.random() * 1.5 + 1}s linear forwards`;
        document.body.appendChild(c); setTimeout(() => c.remove(), 2500);
    }
}

function toggleMode() {
    mode = (mode === "math") ? "spelling" : "math";
    document.getElementById("mathArea").style.display = (mode === "math") ? "block" : "none";
    document.getElementById("spellingArea").style.display = (mode === "spelling") ? "block" : "none";
    nextTask();
}

function nextTask() {
    attempts = 0; penaltyApplied = false; currentRevealedIndices = [];
    document.getElementById("message").innerText = "";
    document.getElementById("visualAid").innerHTML = "";
    if (mode === "math") generateMath(); else generateSpelling();
}

function generateMath() {
    const qCount = user.math + 1;
    if (qCount <= 3) { // Easy Addition/Subtraction
        operator = Math.random() > 0.5 ? "+" : "-";
        num1 = Math.floor(Math.random() * 10) + 10;
        num2 = Math.floor(Math.random() * 8) + 1;
    } else if (qCount <= 7) { // Medium: Add/Sub & Small X
        const ops = ["+", "-", "*"];
        operator = ops[Math.floor(Math.random() * 3)];
        if (operator === "*") {
            num1 = Math.floor(Math.random() * 4) + 2; // Digits 2-5
            num2 = Math.floor(Math.random() * 4) + 2; 
        } else {
            num1 = Math.floor(Math.random() * 15) + 15;
            num2 = Math.floor(Math.random() * 10) + 5;
        }
    } else { // Hard: X and / with Digits 6-9
        operator = Math.random() > 0.5 ? "*" : "/";
        num2 = Math.floor(Math.random() * 4) + 6; // Digits 6,7,8,9
        let ans = Math.floor(Math.random() * 4) + 6;
        if (operator === "*") {
            num1 = ans; // result is num1 * num2
        } else {
            num1 = num2 * ans; // result is num1 / num2
        }
    }
    if (operator === "-" && num2 > num1) [num1, num2] = [num2, num1];
    correctAnswer = (operator === "+") ? num1 + num2 : (operator === "-") ? num1 - num2 : (operator === "*") ? num1 * num2 : num1 / num2;
    document.getElementById("mathQuestion").innerText = `${num1} ${operator === '*' ? '×' : (operator === '/' ? '÷' : operator)} ${num2}`;
    document.getElementById("mathInput").value = "";
}

function generateSpelling() {
    if (mistakeBuffer.length > 0 && questionsSinceMistake >= 4) {
        currentWord = mistakeBuffer.shift();
        questionsSinceMistake = 0;
    } else {
        if (spellQueue.length === 0) spellQueue = [...spellingWords].sort(() => Math.random() - 0.5);
        currentWord = spellQueue.pop().toLowerCase();
        questionsSinceMistake++;
    }
    const grid = document.getElementById("letterGrid");
    grid.innerHTML = "";
    for (let i = 0; i < currentWord.length; i++) {
        const b = document.createElement("input"); b.className = "letter-box"; b.maxLength = 1;
        if (i === 0 || i === currentWord.length - 1) { b.value = currentWord[i]; b.disabled = true; }
        else { b.oninput = (e) => { if (e.target.value && i < currentWord.length - 2) grid.children[i+1].focus(); }; }
        grid.appendChild(b);
    }
    setTimeout(sayWord, 400);
}

function sayWord() {
    window.speechSynthesis.cancel();
    let m = new SpeechSynthesisUtterance(currentWord); m.rate = 0.7; window.speechSynthesis.speak(m);
}

function checkAnswer() {
    let val = "";
    if (mode === "math") val = document.getElementById("mathInput").value;
    else document.querySelectorAll(".letter-box").forEach(b => val += b.value);
    if (!val) return;
    
    const isCorrect = (mode === "math") ? (parseInt(val) === correctAnswer) : (val.toLowerCase() === currentWord);
    const limitReached = (mode === "math" ? user.math >= 10 : user.spell >= 20);

    let qText = mode === "math" ? document.getElementById("mathQuestion").innerText : currentWord;
    user.history += `[${new Date().toLocaleTimeString()}] ${qText}=${val} (${isCorrect?'OK':'X'})\n`;

    if (isCorrect) {
        playCheer(); createConfetti();
        let r = 0;
        if (!limitReached && user.today < 300) {
            r = 10;
            if (mode === "math") user.math++;
            if (mode === "spelling") user.spell++;
        }
        user.total += r; user.today += r;
        document.getElementById("message").style.color = "green";
        document.getElementById("message").innerText = `Bravo ${user.name}! 🌟`;
        sync(); updateScore(); setTimeout(nextTask, 1500);
    } else {
        attempts++; playFart();
        if (mode === "spelling") {
            setTimeout(sayWord, 600);
            if (!mistakeBuffer.includes(currentWord)) mistakeBuffer.push(currentWord);
        }
        if (!penaltyApplied && !limitReached) {
            user.total = Math.max(0, user.total - 3); user.today = Math.max(0, user.today - 3);
            penaltyApplied = true;
            user.logs += `[${new Date().toLocaleTimeString()}] ${mode}: ${val} wrong.\n`;
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = "-3 Tokens Penalty 💨";
            sync(); updateScore();
        }
        showHelp();
        if (attempts >= 6) {
            document.getElementById("message").innerText = `Ans: ${mode === "math" ? correctAnswer : currentWord}`;
            setTimeout(nextTask, 2500);
        }
    }
}

function showHelp() {
    const aid = document.getElementById("visualAid"); aid.innerHTML = "";
    if (mode === "math") {
        if (operator === "+") {
            const g1 = document.createElement("div"); g1.className = "ten-frame-grid";
            for(let i=0;i<num1;i++){const d=document.createElement("div");d.className="dot";g1.appendChild(d);}
            aid.appendChild(g1); aid.innerHTML += "+";
            const g2 = document.createElement("div"); g2.className = "ten-frame-grid";
            for(let i=0;i<num2;i++){const d=document.createElement("div");d.className="dot secondary";g2.appendChild(d);}
            aid.appendChild(g2);
        } else if (operator === "-") {
            const g1 = document.createElement("div"); g1.className = "ten-frame-grid";
            for(let i=0;i<num1;i++){const d=document.createElement("div");d.className=(i<num2)?"dot dim":"dot";g1.appendChild(d);}
            aid.appendChild(g1);
        } else if (operator === "*") {
            for(let r=0; r<num1; r++) {
                const row = document.createElement("div"); row.style.display="flex"; row.style.justifyContent="center";
                for(let c=0; c<num2; c++) { const d=document.createElement("div"); d.className="dot"; d.style.margin="1px"; row.appendChild(d); }
                aid.appendChild(row);
            }
        } else if (operator === "/") {
            for(let g=0; g<num2; g++) {
                const grp = document.createElement("div"); grp.className = "division-group";
                for(let i=0; i<correctAnswer; i++) { const d = document.createElement("div"); d.className = "dot"; d.style.margin="1px"; grp.appendChild(d); }
                aid.appendChild(grp);
            }
        }
    } else {
        let availableIndices = [];
        for(let i=1; i<currentWord.length-1; i++) {
            if(!currentRevealedIndices.includes(i)) availableIndices.push(i);
        }
        if(availableIndices.length > 0) {
            let randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            currentRevealedIndices.push(randomIndex);
        }
        let hint = "";
        for(let i=0; i<currentWord.length; i++) {
            if (i === 0 || i === currentWord.length - 1 || currentRevealedIndices.includes(i)) {
                hint += currentWord[i] + " ";
            } else {
                hint += "_ ";
            }
        }
        aid.innerHTML = `<p style='font-size:32px; color:#2196F3; letter-spacing:4px; font-weight:bold; margin:0;'>${hint.toLowerCase()}</p>`;
    }
}

function updateScore() {
    document.getElementById("mathCount").innerText = user.math;
    document.getElementById("spellCount").innerText = user.spell;
    document.getElementById("todayTokens").innerText = user.today;
    document.getElementById("totalTokens").innerText = user.total;
    document.getElementById("progressBar").style.width = Math.min((user.today/300)*100, 100) + "%";
}

function resetPrompt() {
    let b = Math.floor(Math.random()*4)+11;
    if (prompt(`Admin: ${b}x${b}?`) == b*b) {
        let c = prompt("1: Reset Today\n2: Reset Total\n3: Errors (Wipes after reading)\n4: History Log");
        if(c=="1") { user.math=0; user.spell=0; user.today=0; }
        else if(c=="2") { user.total=0; user.math=0; user.spell=0; user.today=0; }
        else if(c=="3") { alert(user.logs || "No errors logged yet."); user.logs = ""; }
        else if(c=="4") { alert(user.history || "No history logged yet."); }
        sync(); updateScore();
    }
}
</script>
</body>
</html>
