<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Token Clubhouse</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to bottom, #74b9ff, #a29bfe);
  text-align: center;
  padding: 20px;
  margin: 0;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 20px;
  max-width: 400px;
  margin: auto;
}

h2 { margin-top: 0; }

input {
  width: 90%;
  padding: 10px;
  margin: 8px;
  font-size: 16px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  background: #0984e3;
  color: white;
}

.question {
  font-size: 48px;
  font-weight: bold;
}

#displayArea {
  font-size: 36px;
  color: green;
  min-height: 40px;
  margin: 10px;
}

#message {
  font-size: 18px;
  font-weight: bold;
}

.keypad {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.key {
  width: 60px;
  height: 60px;
  margin: 5px;
  font-size: 20px;
  border-radius: 10px;
  background: #dfe6e9;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h2>Login</h2>
  <input id="name" placeholder="Name"><br>
  <input id="pin" placeholder="PIN" type="password"><br>
  <button onclick="login()">Login</button>
</div>

<div class="container" id="appBox" style="display:none;">
  <h2 id="welcome"></h2>

  <p>💰 Total: <span id="total"></span></p>
  <p>⭐ Today: <span id="today"></span></p>

  <button onclick="startMath()">Math</button>
  <button onclick="startSpell()">Spelling</button>

  <div id="gameArea" style="display:none;">
    <div class="question" id="question"></div>
    <div id="displayArea"></div>
    <div id="message"></div>

    <div class="keypad" id="keypad"></div>

    <button onclick="submitAnswer()">Submit</button>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNKQpzsyk5W5QCtUOBWDo0J2LTMGtBgsf4QiWe6UbD8qdIJ2LY-x0PWWdnOhckM3i5vA/exec";

let user = {};
let mode = "";
let answer = 0;
let currentInput = "";

// LOGIN
async function login() {
  const name = document.getElementById("name").value;
  const pin = document.getElementById("pin").value;

  let res = await fetch(`${SCRIPT_URL}?action=login&name=${name}&pin=${pin}`);
  let data = await res.json();

  if (data === "error") {
    alert("Login failed");
    return;
  }

  user = data;
  user.name = name;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";
  document.getElementById("welcome").innerText = "Hi " + name;

  updateUI();
}

// UPDATE UI
function updateUI() {
  document.getElementById("total").innerText = user.total;
  document.getElementById("today").innerText = user.today;
}

// START MATH
function startMath() {
  mode = "math";
  document.getElementById("gameArea").style.display = "block";

  let a = Math.floor(Math.random()*10)+1;
  let b = Math.floor(Math.random()*10)+1;

  answer = a + b;
  document.getElementById("question").innerText = `${a} + ${b}`;

  currentInput = "";
  document.getElementById("displayArea").innerText = "";

  renderKeypad();
}

// START SPELLING
let words = ["apple","dog","cat","bird"];

function startSpell() {
  mode = "spell";
  document.getElementById("gameArea").style.display = "block";

  let w = words[Math.floor(Math.random()*words.length)];
  answer = w;

  document.getElementById("question").innerText = w[0] + " _ _ " + w[w.length-1];

  currentInput = "";
  document.getElementById("displayArea").innerText = "";

  renderKeyboardLetters();
}

// KEYPAD NUMBERS
function renderKeypad() {
  let pad = document.getElementById("keypad");
  pad.innerHTML = "";

  for (let i=0;i<=9;i++) {
    let b = document.createElement("button");
    b.className="key";
    b.innerText=i;
    b.onclick=()=>press(i);
    pad.appendChild(b);
  }
}

// LETTER KEYS
function renderKeyboardLetters() {
  let pad = document.getElementById("keypad");
  pad.innerHTML = "";

  let letters = "abcdefghijklmnopqrstuvwxyz";

  for (let l of letters) {
    let b = document.createElement("button");
    b.className="key";
    b.innerText=l;
    b.onclick=()=>press(l);
    pad.appendChild(b);
  }
}

// PRESS KEY
function press(val) {
  currentInput += val;
  document.getElementById("displayArea").innerText = currentInput;
}

// SUBMIT
function submitAnswer() {

  if (!currentInput) return;

  let correct = (mode==="math")
    ? Number(currentInput) === answer
    : currentInput.toLowerCase() === answer;

  let reward = correct ? 2 : 0;

  if (correct) {
    document.getElementById("message").innerText = `+${reward} 🪙 Great job!`;
    user.total += reward;
    user.today += reward;

    if(mode==="math") user.math++;
    if(mode==="spell") user.spell++;

  } else {
    document.getElementById("message").innerText = "Try again!";
    let time = new Date();
    let log = `[${time.getHours()}:${time.getMinutes()}] ${answer} → ${currentInput}\n`;
    user.logs = (user.logs || "") + log;
  }

  sync();
  updateUI();

  currentInput="";
  document.getElementById("displayArea").innerText="";
}

// SYNC TO GOOGLE SHEET
async function sync() {
  await fetch(SCRIPT_URL, {
    method:"POST",
    body: JSON.stringify(user)
  });
}
</script>

</body>
</html>
